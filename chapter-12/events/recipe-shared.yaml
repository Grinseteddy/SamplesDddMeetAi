asyncapi: 3.0.0
info:
  title: RecipeShared Event
  version: 1.0.0
  description: |
    Published by the Sharing bounded context whenever a Cook publishes a new Recipe.
    Consumed by the Rating context (to initialise a rating record) and the Ordering context
    (to make the ingredient list available for shopping-list generation).

channels:
  cookwithus/sharing/recipe-shared:
    address: cookwithus/sharing/recipe-shared
    messages:
      RecipeShared:
        $ref: '#/components/messages/RecipeShared'

operations:
  publishRecipeShared:
    action: send
    channel:
      $ref: '#/channels/cookwithus~1sharing~1recipe-shared'
    messages:
      - $ref: '#/channels/cookwithus~1sharing~1recipe-shared/messages/RecipeShared'

components:
  messages:
    RecipeShared:
      name: RecipeShared
      title: Recipe Shared
      summary: A Cook has published a Recipe to the community feed.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/RecipeSharedPayload'

  schemas:
    RecipeSharedPayload:
      type: object
      required:
        - eventId
        - occurredAt
        - recipeId
        - authorId
        - title
        - category
        - ingredients
      properties:
        eventId:
          type: string
          format: uuid
          description: Unique identifier of this event instance
        occurredAt:
          type: string
          format: date-time
        recipeId:
          type: string
          format: uuid
        authorId:
          type: string
          format: uuid
          description: Cook who published the Recipe
        title:
          type: string
        category:
          type: string
        ingredients:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - name
              - quantity
              - unit
            properties:
              name:
                type: string
              quantity:
                type: number
              unit:
                type: string
