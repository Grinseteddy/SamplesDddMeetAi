# Spectral ruleset for the AsyncAPI 3.1.0 house style.
# Extends the built-in AsyncAPI ruleset (structural validation for v2 + v3)
# and layers on the house-style conventions.
#
# Usage:
#   spectral lint <spec>.yaml --ruleset assets/house-style.spectral.yaml
#
# Tune severities to taste. Anything at `error` must be fixed; `warn` should be
# reviewed and resolved unless deliberately waived.

extends: ["spectral:asyncapi"]

rules:
  # --- Tighten a few built-ins to errors ---
  asyncapi-info-contact: error          # require an info.contact block

  # --- House-style rules ---

  house-channel-keys-camelCase:
    description: "Channel keys must be camelCase (e.g. taskEvents)."
    severity: error
    given: "$.channels"
    then:
      field: "@key"
      function: pattern
      functionOptions:
        match: "^[a-z][a-zA-Z0-9]*$"

  house-operation-keys-camelCase:
    description: "Operation keys must be camelCase, verb + noun (e.g. publishTaskCreated)."
    severity: error
    given: "$.operations"
    then:
      field: "@key"
      function: pattern
      functionOptions:
        match: "^[a-z][a-zA-Z0-9]*$"

  house-operation-action-valid:
    description: "Every operation must declare action: send or receive."
    severity: error
    given: "$.operations[*].action"
    then:
      function: enumeration
      functionOptions:
        values:
          - send
          - receive

  house-message-keys-camelCase:
    description: "Message component keys should be camelCase (e.g. taskCreated)."
    severity: warn
    given: "$.components.messages"
    then:
      field: "@key"
      function: pattern
      functionOptions:
        match: "^[a-z][a-zA-Z0-9]*$"

  house-message-name-pascal-case:
    description: "Message name should be PascalCase (e.g. TaskCreated)."
    severity: warn
    given: "$.components.messages[*].name"
    then:
      function: pattern
      functionOptions:
        match: "^[A-Z][a-zA-Z0-9]*$"

  house-message-has-summary:
    description: "Messages should have a one-line summary."
    severity: warn
    given: "$.components.messages[*]"
    then:
      field: summary
      function: truthy

  house-schema-names-pascal-case:
    description: "Component schema names should be PascalCase (e.g. TaskCreatedPayload)."
    severity: warn
    given: "$.components.schemas"
    then:
      field: "@key"
      function: pattern
      functionOptions:
        match: "^[A-Z][a-zA-Z0-9]*$"

  house-channel-address-kebab-case:
    description: "Channel address segments should be kebab-case paths (e.g. task-management/tasks)."
    severity: warn
    given: "$.channels[*].address"
    then:
      function: pattern
      functionOptions:
        match: "^[a-z0-9]+([-/][a-z0-9]+)*$"

  house-operations-have-description:
    description: "Operations should have a description explaining when the event fires and its side effects."
    severity: warn
    given: "$.operations[*]"
    then:
      field: description
      function: truthy
